# .github/labeler.yml — Labels applied automatically to PRs by changed file paths.
# Consumed by actions/labeler@v5 in the Label Management workflow.

backend:
  - changed-files:
      - any-glob-to-any-file: ['backend/**']

frontend:
  - changed-files:
      - any-glob-to-any-file: ['frontend/**']

docker:
  - changed-files:
      - any-glob-to-any-file: ['docker/**', 'docker-compose*.yml', 'Dockerfile*']

ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/**']

documentation:
  - changed-files:
      - any-glob-to-any-file: ['**.md', 'docs/**']

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'pixi.toml'
          - 'pixi.lock'
          - '**/pyproject.toml'
          - '**/package.json'
          - '**/package-lock.json'
