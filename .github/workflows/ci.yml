name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Note on the Python matrix: the pixi umbrella pins the interpreter in
# pixi.toml / pixi.lock (python 3.13.*), so every job runs the single locked
# environment rather than a per-version matrix. A true multi-version matrix
# would require separate pixi environments per Python; that is deferred (the
# `pixi run ci` local gate remains authoritative).

jobs:
  # --- Backend quality: ruff lint, ruff format check, mypy, bandit ---
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
      - name: Ruff lint
        run: pixi run lint
      - name: Ruff format check
        run: pixi run fmt-check
      - name: mypy
        run: pixi run check
      - name: bandit security scan
        run: pixi run security

  # --- Backend tests + branch coverage -> Codecov (flag: backend) ---
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
      - name: Run tests with coverage
        run: pixi run cov-xml
      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml
          flags: backend
          name: backend
          fail_ci_if_error: false

  # --- Frontend quality: oxlint, tsc type check ---
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
      - name: oxlint
        run: pixi run fe-lint
      - name: tsc type check
        run: pixi run fe-typecheck

  # --- Frontend tests + v8 coverage (lcov) -> Codecov (flag: frontend) ---
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-quality
    steps:
      - uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
      - name: Run tests with coverage
        run: pixi run fe-cov
      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend
          fail_ci_if_error: false

  # --- Backend package build (wheel) ---
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
      - name: Build wheel
        run: pixi run build

  # --- Frontend production build (tsc + vite) ---
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-quality
    steps:
      - uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
      - name: Build SPA
        run: pixi run fe-build

  # --- Docker image build validation (no push) ---
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
