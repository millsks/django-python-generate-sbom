name: Docs

# Builds the MkDocs Material site and deploys it to GitHub Pages on pushes to main
# that touch the docs (or on demand). Also exposed as a reusable workflow so the
# release workflow can rebuild + republish the docs when a release is cut (Story
# 11.10). Operator prerequisite: in repo Settings → Pages, set Source = "GitHub
# Actions" (Pages requires a public repo or a paid plan).

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
  # Reusable: invoked by release.yml after a release is published (Story 11.10).
  workflow_call:

# Least-privilege token for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build docs (strict)
        run: pixi run docs-build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
