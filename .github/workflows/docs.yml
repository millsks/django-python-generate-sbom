name: Docs

# Builds the MkDocs Material site and deploys it to GitHub Pages. The published site
# is refreshed **only when a release is cut** (release.yml calls this as a reusable
# workflow — Story 11.10) or on demand via workflow_dispatch. It intentionally does NOT
# deploy on every push to main; docs build validation on push/PR is handled by the CI
# gate (`pixi run docs-build --strict` inside `pixi run ci`). Operator prerequisite: in
# repo Settings → Pages, set Source = "GitHub Actions" (Pages requires a public repo or
# a paid plan).

on:
  # Manual redeploy on demand.
  workflow_dispatch:
  # Reusable: invoked by release.yml after a release is published (Story 11.10) — this
  # is the primary publish path, so docs track releases, not every push to main.
  workflow_call:

# Least-privilege token for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build docs (strict)
        run: pixi run docs-build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
