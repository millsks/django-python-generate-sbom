name: Stale Issue & PR Management

on:
  schedule:
    - cron: "0 1 * * *" # Daily at 1 AM UTC
  workflow_dispatch:

jobs:
  stale:
    name: Mark and Close Stale Items
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 60
          days-before-issue-close: 7
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had no activity
            for 60 days. It will be closed in 7 days if no further activity occurs.
            To keep it open, comment or add an exempt label (pinned, security, in-progress).
          stale-pr-message: >
            This PR has been automatically marked as stale because it has had no activity
            for 30 days. It will be closed in 14 days if no further activity occurs.
            To keep it open, rebase and update, or add an exempt label (pinned, security, in-progress).
          close-issue-message: >
            This issue has been closed due to inactivity. Feel free to reopen it if it
            becomes relevant again.
          close-pr-message: >
            This PR has been closed due to inactivity. Feel free to reopen it if you
            intend to continue working on it.
          exempt-issue-labels: "pinned,security,in-progress,bug,enhancement,good first issue"
          exempt-pr-labels: "pinned,security,in-progress,dependencies,automated"
          exempt-all-milestones: true
          operations-per-run: 100
