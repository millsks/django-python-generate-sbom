  # Epic 17 — OIDC Authentication & OAuth2 API Authorization (Phase 1): migrate authentication to OIDC and ADD
  # OAuth2 to the DRF API, while authorization stays app-managed (org membership + roles unchanged — mapping
  # claims -> entitlements is Epic 18). Fixed decisions: the app is an OIDC Relying Party + OAuth2 Resource
  # Server (NOT an IdP), IdP-agnostic via discovery; a BFF/server-side-session model — the Django backend runs
  # the OIDC Authorization Code + PKCE flow and keeps setting the session cookie, so the SPA stays cookie-based
  # (no tokens in the browser); JIT provisioning creates a zero-org user on first login (preserving Story 2.6),
  # links to an existing local user by VERIFIED email, and persists sub<->user; a single installation-wide IdP
  # (per-org SSO out of scope); coexistence behind OIDC_ENABLED then cutover (local password auth AND OIDC side
  # by side, API keys keep working, OAuth2 added not rip-and-replace). Dependencies (PROPOSED, gated on the
  # user's explicit approval): django-allauth for the authentication half (17.1-17.5 + Epic 18's claim access,
  # via allauth.socialaccount.providers.openid_connect — server-side/session, PKCE+state+nonce, adapter hooks,
  # SocialAccount.extra_data); authlib/PyJWT for the resource-server half (17.6/17.7 — allauth does NOT validate
  # incoming API bearer/JWT tokens). Integration caveat: allauth's SocialAccount/EmailAddress models + adapter/
  # URL conventions must be reconciled with the existing custom User, custom LoginView, and zero-org/active-org
  # session (main risk). Build order: 17.1 -> 17.2 -> 17.3 -> 17.4 -> 17.5, with 17.6 -> 17.7 as a parallel
  # resource-server track, and 17.8 last (coexistence matrix + rollout + cutover). Epic 18 depends on Epic 17.
  epic-17: in-progress
  17-1-oidc-provider-configuration-and-discovery: ready-for-dev
  17-2-backend-oidc-login-bff-auth-code-pkce: ready-for-dev
  17-3-jit-user-provisioning-and-account-linking: ready-for-dev
  17-4-oidc-logout-and-session-lifecycle: ready-for-dev
  17-5-frontend-sso-login: ready-for-dev
  17-6-api-oauth2-resource-server: ready-for-dev
  17-7-oauth2-client-credentials-m2m: ready-for-dev
  17-8-coexistence-flag-rollout-and-cutover: ready-for-dev

