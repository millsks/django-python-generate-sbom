# cliff.toml — git-cliff changelog configuration for the IDP App monorepo.
# Run: pixi run changelog
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{commit.scope}}**: {% endif %}{{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
postprocessors = [
  # Uncomment to linkify issue numbers:
  # { pattern = '\\((\\w+\\s)?#([0-9]+)\\)', replace = "([#${2}](https://github.com/millsks/idp-app/issues/${2}))" },
]

[git]
conventional_commits  = true
filter_unconventional = false
split_commits         = false
commit_preprocessors  = []
commit_parsers = [
  { message = "^feat",                      group = "⭐ Features" },
  { message = "^fix",                       group = "🐛 Bug Fixes" },
  { message = "^doc",                       group = "📚 Documentation" },
  { message = "^perf",                      group = "⚡ Performance" },
  { message = "^refactor",                  group = "🚜 Refactor" },
  { message = "^style",                     group = "🎨 Styling" },
  { message = "^test",                      group = "🧪 Testing" },
  { message = "^build",                     group = "📦 Build" },
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore\\(deps.*\\)",         skip = true },
  { message = "^chore\\(pr\\)",             skip = true },
  { message = "^chore\\(pull\\)",           skip = true },
  { message = "^chore|^ci",                 group = "⚙️ Miscellaneous Tasks" },
  { body    = ".*security",                 group = "🔒 Security" },
  { message = "^revert",                    group = "◀️ Revert" },
  { message = "^Merge",                     skip = true },
  { message = "^Initial commit",            skip = true },
  { message = "^Release v",                 skip = true },
]
protect_breaking_commits = false
filter_commits           = false
tag_pattern              = "v[0-9].*"
topo_order               = false
sort_commits             = "oldest"
