# Full local stack for django-python-generate-sbom (Story 1.2).
#
# All Django/Celery services share one umbrella image (AD-13); the SPA is baked
# in at build time. All configuration comes from .env (copy from .env.example);
# no secrets are hardcoded here.
services:
  web:
    build: .
    command: sh -c "pixi run migrate && pixi run seed-superuser && pixi run web"
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "pixi", "run", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker-pipeline:
    build: .
    command: pixi run worker-pipeline
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully

  worker-analysis:
    build: .
    command: pixi run worker-analysis
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully

  beat:
    build: .
    command: pixi run beat
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # postgres:18+ stores data in a major-version subdirectory; mount the
      # parent (not /var/lib/postgresql/data) per the docker-library convention.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # One-shot: create the artifact bucket so the first manifest/artifact write
  # doesn't fail with NoSuchBucket. Waits for MinIO, then exits 0 (idempotent).
  createbuckets:
    image: minio/mc
    env_file: .env
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb --ignore-existing local/\"$$AWS_STORAGE_BUCKET_NAME\";
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
