# MkDocs Material configuration (Story 11.1). The nav skeleton below is filled in
# by the Epic 11 content stories (11.2–11.6). Build strictly with `pixi run docs-build`.
site_name: django-python-generate-sbom
site_description: Generate and analyze CycloneDX SBOMs for Python projects — vulnerabilities, licenses, and version currency.
site_url: https://millsks.github.io/django-python-generate-sbom/
repo_url: https://github.com/millsks/django-python-generate-sbom
repo_name: millsks/django-python-generate-sbom
edit_uri: edit/main/docs/
copyright: Copyright &copy; Kevin Mills

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    # Light mode (brand red primary, amber/gold accent) with a toggle to dark.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      # Static (griffe) rendering of the backend docstrings — no Django runtime import.
      # `paths` points griffe at backend/ so the generate_sbom package resolves.
      handlers:
        python:
          paths: [backend]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_if_no_docstring: false
            members_order: source
            separate_signature: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      # Render fenced ```mermaid blocks as diagrams (mkdocs-material bundles
      # mermaid.js and hydrates any element with class="mermaid").
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets:
      # Include repo-root files (e.g. CONTRIBUTING.md) into docs pages without
      # duplication. Resolved from the repo root, where `pixi run docs-build` runs.
      base_path:
        - .
      check_paths: true

nav:
  - User Guide:
      - user-guide/index.md
      - Accounts & Organizations: user-guide/accounts-and-organizations.md
      - Generating an SBOM: user-guide/generating-an-sbom.md
      - Reading the Results: user-guide/reading-the-results.md
      - Exporting & Downloading: user-guide/exporting-and-downloading.md
      - Job History: user-guide/job-history.md
      - API Keys: user-guide/api-keys.md
  - How-To:
      - Overview: how-to/index.md
      - Generate an SBOM: how-to/generate-sbom.md
      - Interpret the vulnerability report: how-to/interpret-vulnerabilities.md
      - Check license compliance: how-to/check-license-compliance.md
      - Find outdated dependencies: how-to/find-outdated-dependencies.md
      - Export a report to Excel: how-to/export-to-excel.md
      - Create and use an API key: how-to/manage-api-keys.md
      - Invite a member / switch organizations: how-to/manage-organization.md
  - Developer:
      - developer/index.md
      - Architecture: developer/architecture.md
      - Local Development: developer/setup.md
      - Project Layout: developer/project-layout.md
      - SBOM Pipeline: developer/pipeline.md
      - Data Model: developer/data-model.md
      - Testing: developer/testing.md
      - Code Reference: developer/code-reference.md
  - API Reference:
    - Overview: api/index.md
    - Authentication: api/authentication.md
    - Organizations & Membership: api/organizations.md
    - API Keys: api/api-keys.md
    - Jobs: api/jobs.md
    - Reports: api/analysis.md
    - Artifacts & Downloads: api/artifacts.md
  - Deployment:
      - OpenShift:
          - deployment/openshift/index.md
          - Architecture: deployment/openshift/architecture.md
          - Migration Guide: deployment/openshift/migration-guide.md
          - Reference: deployment/openshift/reference.md
  - Contributing: contributing.md
