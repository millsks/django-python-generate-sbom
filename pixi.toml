# Umbrella pixi manifest for the whole project (AD-13).
# Installs the Python env (backend) AND the Node runtime (frontend), and
# orchestrates every task. Backend tasks run with cwd = "backend"; frontend
# tasks run with cwd = "frontend" and shell out to npm/vite.
[workspace]
authors = ["Kevin Mills <millsks@gmail.com>"]
channels = ["conda-forge"]
name = "django-python-generate-sbom"
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]
version = "0.1.0"

# Version floors relaxed to what conda-forge actually serves today; the
# ARCHITECTURE-SPINE pins (Django 6.0.6, DRF 3.17.1, Celery 5.6.3, etc.) are
# aspirational future versions. Resolved versions are captured in pixi.lock and
# will be tightened toward the spine pins as those land on conda-forge.
[dependencies]
python = "3.13.*"
nodejs = ">=20"
django = ">=5.1"
djangorestframework = ">=3.15"
djangorestframework-api-key = ">=3.1"
celery = ">=5.3"
redis-py = ">=5"
structlog = ">=24"
django-environ = ">=0.11"
django-storages = ">=1.14"
boto3 = ">=1.34"
psycopg = ">=3.1"
gunicorn = ">=22"
whitenoise = ">=6.6"
curl = ">=8"
uv = ">=0.11.26,<0.12"
cyclonedx-python-lib = ">=11.11,<12"
lib4sbom = ">=0.10.4,<0.11"
requests = ">=2.32,<3"
requests-cache = ">=1.2,<2"
requests-ratelimiter = ">=0.7,<1"
tenacity = ">=9,<10"
networkx = ">=3.4,<4"
pygraphviz = ">=1.14,<2"
graphviz = ">=12,<15"
drf-spectacular = ">=0.27"
drf-spectacular-sidecar = ">=2026.7.1,<2027"

[pypi-dependencies]
generate-sbom = { path = "./backend", editable = true }

[feature.dev.dependencies]
pytest = ">=8,<9"
pytest-cov = ">=6,<8"
pytest-django = ">=4.9,<5"
mypy = ">=1.13,<2"
ruff = ">=0.14,<0.16"
pre-commit = ">=4,<5"
django-stubs = ">=5.1,<6"
djangorestframework-stubs = ">=3.15,<4"
git-cliff = ">=2,<3"
python-build = ">=1.2,<2"
hatchling = ">=1.25,<2"
responses = ">=0.25,<1"
bandit = ">=1.7,<2"
flower = ">=2,<3"
mkdocs-material = ">=9.5,<10"
mkdocstrings-python = ">=1.11,<2"

[environments]
default = { features = ["dev"], solve-group = "default" }

# --- Backend (Python) tasks — run from ./backend ---
[tasks.fmt]
cmd = "ruff format ."
cwd = "backend"

[tasks.lint]
cmd = "ruff check ."
cwd = "backend"

[tasks.check]
cmd = "mypy generate_sbom"
cwd = "backend"

[tasks.test]
cmd = "pytest tests/unit/"
cwd = "backend"

[tasks.test-integration]
cmd = "pytest tests/integration/"
cwd = "backend"

[tasks.cov]
cmd = "pytest tests/ --cov=generate_sbom --cov-report=term-missing --cov-fail-under=90"
cwd = "backend"

[tasks.build]
cmd = "python -m build --no-isolation --wheel"
cwd = "backend"

# Non-mutating format check (companion to the mutating `fmt`) — CI-friendly.
[tasks.fmt-check]
cmd = "ruff format --check ."
cwd = "backend"

# Lint with autofix (companion to the read-only `lint`).
[tasks.lint-fix]
cmd = "ruff check --fix ."
cwd = "backend"

# Static security scan (bandit); reads [tool.bandit] from pyproject, medium+ severity
# only so low-noise asserts don't fail it.
[tasks.security]
cmd = "bandit -r generate_sbom -c pyproject.toml -ll"
cwd = "backend"

# Full suite with an HTML coverage report for local inspection (htmlcov/).
[tasks.cov-html]
cmd = "pytest tests/ --cov=generate_sbom --cov-report=html"
cwd = "backend"

# CI coverage: same gate as `cov` plus branch coverage and a machine-readable
# coverage.xml (backend/coverage.xml) for the Codecov upload (Story 9.1).
[tasks.cov-xml]
cmd = "pytest tests/ --cov=generate_sbom --cov-branch --cov-report=xml --cov-report=term-missing --cov-fail-under=90"
cwd = "backend"

# --- Server / ops tasks — also the Docker service commands ---
[tasks.migrate]
cmd = "python manage.py migrate"
cwd = "backend"

[tasks.collectstatic]
cmd = "python manage.py collectstatic --noinput"
cwd = "backend"

[tasks.web]
cmd = "gunicorn config.wsgi --bind 0.0.0.0:8000 --workers 4"
cwd = "backend"

[tasks.worker-pipeline]
cmd = "celery -A config.celery_app worker -Q pipeline -c 4"
cwd = "backend"

[tasks.worker-analysis]
cmd = "celery -A config.celery_app worker -Q analysis -c 4"
cwd = "backend"

[tasks.beat]
cmd = "celery -A config.celery_app beat -s /tmp/celerybeat-schedule"
cwd = "backend"

# Celery Flower monitoring UI (http://localhost:5555).
[tasks.flower]
cmd = "celery -A config.celery_app flower --port=5555"
cwd = "backend"

# --- Project-wide tasks — run from the root ---
[tasks.bootstrap]
cmd = "pre-commit install --install-hooks --hook-type commit-msg --hook-type pre-commit"

[tasks.changelog]
cmd = "git cliff -o CHANGELOG.md"

[tasks.precommit]
cmd = "pre-commit run --all-files"

[tasks.act]
cmd = "act --container-architecture linux/amd64"

# Refresh pinned pre-commit hook revisions (bootstrap already installs the
# commit-msg + pre-commit hooks; this keeps their versions current).
[tasks.hooks-update]
cmd = "pre-commit autoupdate"

# Prepend only the unreleased commits to CHANGELOG.md (companion to the full `changelog`).
[tasks.changelog-unreleased]
cmd = "git cliff --unreleased --prepend CHANGELOG.md"

# --- Documentation site (MkDocs Material → GitHub Pages; Story 11.1) ---
# Live-reload preview at http://localhost:8000.
[tasks.docs-serve]
cmd = "mkdocs serve"

# Strict build (broken links/nav fail); outputs the static site to ./site.
[tasks.docs-build]
cmd = "mkdocs build --strict"

# --- Docker Compose convenience wrappers (compose file at repo root) ---
[tasks.docker-build]
cmd = "docker compose build"

[tasks.docker-up]
cmd = "docker compose up -d"

[tasks.docker-down]
cmd = "docker compose down"

[tasks.docker-down-v]
cmd = "docker compose down -v"

[tasks.docker-logs]
cmd = "docker compose logs -f"

[tasks.docker-ps]
cmd = "docker compose ps"

[tasks.docker-migrate]
cmd = "docker compose exec web pixi run migrate"

[tasks.docker-shell]
cmd = "docker compose exec web bash"

# --- Frontend (Node) tasks — run from ./frontend; pixi provides the Node runtime ---
[tasks.fe-install]
cmd = "npm install"
cwd = "frontend"

[tasks.fe-lint]
cmd = "npm run lint"
cwd = "frontend"
depends-on = ["fe-install"]

[tasks.fe-build]
cmd = "npm run build"
cwd = "frontend"
depends-on = ["fe-install"]

[tasks.fe-test]
cmd = "npm run test"
cwd = "frontend"
depends-on = ["fe-install"]

# Standalone type check (tsc, no emit via tsconfig noEmit) so CI can type-check
# independently of the build. Runs the local tsc binary — no registry access.
[tasks.fe-typecheck]
cmd = "node_modules/.bin/tsc -b"
cwd = "frontend"
depends-on = ["fe-install"]

# npm dependency vulnerability audit for the frontend; gates on high/critical
# (lists moderate/low too, but doesn't fail the task on them).
[tasks.fe-security]
cmd = "npm audit --audit-level=high"
cwd = "frontend"
depends-on = ["fe-install"]

# Frontend tests with v8 coverage → frontend/coverage/lcov.info for the Codecov
# upload (Story 9.1). Vitest coverage config lives in vitest.config.ts.
[tasks.fe-cov]
cmd = "npm run test:coverage"
cwd = "frontend"
depends-on = ["fe-install"]

# Unified CI gate across both backend and frontend (AD-13 pixi umbrella). Mirrors
# the GitHub CI quality jobs: ruff lint + format-check, mypy, bandit (backend);
# oxlint + tsc (frontend); full coverage; and both builds. Story 9.1 wired the
# format-check / security / typecheck gates in so local == CI.
[tasks.ci]
depends-on = [
  "precommit",
  "build",
  "check",
  "lint",
  "fmt-check",
  "security",
  "cov",
  "fe-lint",
  "fe-typecheck",
  "fe-test",
  "fe-build",
  "docs-build",
]
