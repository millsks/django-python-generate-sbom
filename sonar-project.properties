# SonarCloud configuration for django-python-generate-sbom
# https://docs.sonarcloud.io/advanced-setup/analysis-parameters/
#
# Operator prerequisites (Story 9.2): a SonarCloud project bound to this repo
# and a SONAR_TOKEN repository secret. Confirm the exact projectKey/organization
# when the SonarCloud project is created — the values below follow SonarCloud's
# default `<org>_<repo>` convention.

# Project identification
sonar.projectKey=millsks_django-python-generate-sbom
sonar.organization=millsks

# SonarCloud host (required by the sonarqube-scan-action for the cloud service)
sonar.host.url=https://sonarcloud.io

# Project metadata
sonar.projectName=django-python-generate-sbom
sonar.projectVersion=0.1.0

# Source code settings (Django/DRF backend + React/TS frontend SPA)
sonar.sources=backend/generate_sbom,frontend/src
sonar.tests=backend/tests,frontend/src

# Python-specific settings (pixi pins the 3.13 interpreter)
sonar.python.version=3.13

# Coverage settings (reports produced in-job by `pixi run cov-xml` / `fe-cov`)
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.coverage.exclusions=backend/tests/**,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx

# Test settings (co-located frontend tests + the backend tests package)
sonar.test.inclusions=backend/tests/**,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx

# Exclude files from analysis
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.egg-info/**,\
  **/migrations/**,\
  .pixi/**,\
  .pytest_cache/**,\
  **/node_modules/**,\
  frontend/dist/**,\
  _bmad-output/**,\
  _bmad/**,\
  .agents/**,\
  .claude/**,\
  docker/**

# Language-specific source encoding
sonar.sourceEncoding=UTF-8
